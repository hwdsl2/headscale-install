name: test_set_1

on: workflow_call

jobs:
  test_set_1:
    runs-on: ubuntu-24.04
    if: github.repository_owner == 'hwdsl2'
    strategy:
      matrix:
        os_version: ["centos:10s", "centos:9s", "almalinux:10", "almalinux:9", "almalinux:8", "rockylinux:8"]
      fail-fast: false
    env:
      OS_VERSION: ${{ matrix.os_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Build
        run: |
          mkdir -p "$GITHUB_WORKSPACE/testing/${OS_VERSION//:}"
          cd "$GITHUB_WORKSPACE/testing/${OS_VERSION//:}"

          mkdir -p scripts
          ls -ld "$GITHUB_WORKSPACE/headscale-install.sh"
          cp -f "$GITHUB_WORKSPACE"/*.sh scripts/

          cat > run.sh <<'EOF'
          #!/bin/bash
          set -eEx

          trap 'catch $? $LINENO' ERR

          catch() {
            echo "Error $1 occurred on line $2."
            cat -n -- "$0" | tail -n+"$(($2 - 3))" | head -n7
            exit 1
          }

          cd /opt/src
          if grep -qs -i rocky /etc/redhat-release; then
            yum -y -q update
          fi
          yum -y -q install wget

          cp -f /opt/src/scripts/headscale-install.sh ./hs-install.sh

          bash hs-install.sh --auto --serverurl http://127.0.0.1:8080

          systemctl status headscale.service
          test -S /var/run/headscale/headscale.sock
          test -f /etc/headscale/config.yaml
          test -x /usr/local/bin/headscale
          grep -q 'server_url: http://127.0.0.1:8080' /etc/headscale/config.yaml
          grep -q 'listen_addr: 0.0.0.0:8080' /etc/headscale/config.yaml
          grep -q 'metrics_listen_addr: 127.0.0.1:9090' /etc/headscale/config.yaml
          grep -q 'level: info' /etc/headscale/config.yaml
          grep -q '1.1.1.1' /etc/headscale/config.yaml

          bash hs-install.sh --listusers
          bash hs-install.sh --listusers | grep -q 'admin'

          bash hs-install.sh --adduser vpnuser
          bash hs-install.sh --listusers | grep -q 'vpnuser'

          bash hs-install.sh --listnodes

          bash hs-install.sh --createkey --user admin
          bash hs-install.sh --listkeys

          bash hs-install.sh --deleteuser vpnuser --yes
          bash hs-install.sh --listusers | grep -q 'vpnuser' && exit 1

          bash hs-install.sh --uninstall --yes

          test -x /usr/local/bin/headscale && exit 1
          test -f /etc/systemd/system/headscale.service && exit 1
          test -f /etc/headscale/config.yaml && exit 1

          # Test --listenaddr option
          bash hs-install.sh --auto --serverurl http://127.0.0.1:8080 --listenaddr 127.0.0.1

          test -f /etc/headscale/config.yaml
          grep -q 'listen_addr: 127.0.0.1:8080' /etc/headscale/config.yaml

          bash hs-install.sh --uninstall --yes

          test -f /etc/headscale/config.yaml && exit 1

          # Test --dnssrv1, --dnssrv2, --loglevel, --metricsport options
          bash hs-install.sh --auto --serverurl http://127.0.0.1:8080 \
            --dnssrv1 9.9.9.9 --dnssrv2 8.8.8.8 --loglevel debug --metricsport 9091

          test -f /etc/headscale/config.yaml
          grep -q 'metrics_listen_addr: 127.0.0.1:9091' /etc/headscale/config.yaml
          grep -q 'level: debug' /etc/headscale/config.yaml
          grep -q '9.9.9.9' /etc/headscale/config.yaml
          grep -q '8.8.8.8' /etc/headscale/config.yaml

          bash hs-install.sh --uninstall --yes

          test -f /etc/headscale/config.yaml && exit 1

          exit 0
          EOF

          if [ "$OS_VERSION" = "centos:9s" ]; then
            echo "FROM quay.io/centos/centos:stream9" > Dockerfile
          elif [ "$OS_VERSION" = "centos:10s" ]; then
            echo "FROM quay.io/centos/centos:stream10" > Dockerfile
          else
            echo "FROM $OS_VERSION" > Dockerfile
          fi

          cat >> Dockerfile <<'EOF'

          ENV container=docker
          WORKDIR /opt/src
          EOF

          if [ "$OS_VERSION" = "centos:9s" ] || [ "$OS_VERSION" = "centos:10s" ]; then
            echo "RUN yum -y -q install systemd" >> Dockerfile
          fi

          cat >> Dockerfile <<'EOF'
          RUN (cd /lib/systemd/system/sysinit.target.wants/; for i in *; do [ "$i" = \
          systemd-tmpfiles-setup.service ] || rm -f "$i"; done); \
          rm -f /lib/systemd/system/multi-user.target.wants/*; \
          rm -f /etc/systemd/system/*.wants/*; \
          rm -f /lib/systemd/system/local-fs.target.wants/*; \
          rm -f /lib/systemd/system/sockets.target.wants/*udev*; \
          rm -f /lib/systemd/system/sockets.target.wants/*initctl*; \
          rm -f /lib/systemd/system/basic.target.wants/*; \
          rm -f /lib/systemd/system/anaconda.target.wants/*;

          COPY scripts/ /opt/src/scripts/
          COPY ./run.sh /opt/src/run.sh
          RUN chmod 755 /opt/src/run.sh

          VOLUME [ "/sys/fs/cgroup" ]

          CMD ["/sbin/init"]
          EOF
          cat Dockerfile
          cat run.sh
          docker build -t "${OS_VERSION//:}-test" .

      - name: Test
        run: |
          docker run -d --name "${OS_VERSION//:}-test-1" -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            --cgroupns=host --privileged "${OS_VERSION//:}-test"
          sleep 5
          docker exec "${OS_VERSION//:}-test-1" /opt/src/run.sh

      - name: Clear
        if: always()
        run: |
          rm -rf "$GITHUB_WORKSPACE/testing/${OS_VERSION//:}"
          docker rm -f "${OS_VERSION//:}-test-1" || true
          docker rmi "${OS_VERSION//:}-test" || true